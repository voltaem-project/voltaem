description "Voltaem Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env VOLTAEMD_BIN="/usr/bin/voltaemd"
env VOLTAEMD_USER="voltaem"
env VOLTAEMD_GROUP="voltaem"
env VOLTAEMD_PIDDIR="/var/run/voltaemd"
# upstart can't handle variables constructed with other variables
env VOLTAEMD_PIDFILE="/var/run/voltaemd/voltaemd.pid"
env VOLTAEMD_CONFIGFILE="/etc/voltaem/voltaem.conf"
env VOLTAEMD_DATADIR="/var/lib/voltaemd"

expect fork

respawn
respawn limit 5 120
kill timeout 60

pre-start script
    # this will catch non-existent config files
    # voltaemd will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$VOLTAEMD_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run voltaemd."
        echo "The setting must appear in $VOLTAEMD_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following"
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is also recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Voltaem Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$VOLTAEMD_PIDDIR"
    chmod 0755 "$VOLTAEMD_PIDDIR"
    chown $VOLTAEMD_USER:$VOLTAEMD_GROUP "$VOLTAEMD_PIDDIR"
    chown $VOLTAEMD_USER:$VOLTAEMD_GROUP "$VOLTAEMD_CONFIGFILE"
    chmod 0660 "$VOLTAEMD_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$VOLTAEMD_PIDFILE" \
    --chuid $VOLTAEMD_USER:$VOLTAEMD_GROUP \
    --exec "$VOLTAEMD_BIN" \
    -- \
    -pid="$VOLTAEMD_PIDFILE" \
    -conf="$VOLTAEMD_CONFIGFILE" \
    -datadir="$VOLTAEMD_DATADIR" \
    -disablewallet \
    -daemon

